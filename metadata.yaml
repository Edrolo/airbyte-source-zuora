data:
  allowedHosts:
    hosts:
      - "${tenant_endpoint}"
      - "*.zuora.com"
      - "*.amazonaws.com"
  connectorSubtype: api
  connectorType: source
  definitionId: 3dc3037c-5ce8-4661-adc2-f7a9e3c5ece5  # real id from the Airbyte registry
  dockerImageTag: 0.2.0  # revival bump; upstream was archived at 0.1.3
  dockerRepository: airbyte/source-zuora
  githubIssueLabel: source-zuora
  icon: zuora.svg
  license: MIT
  name: Zuora
  releaseStage: alpha
  supportLevel: community
  documentationUrl: https://docs.airbyte.com/integrations/sources/zuora
  tags:
    - language:python
    - cdk:python
  connectorBuildOptions:
    baseImage: docker.io/airbyte/python-connector-base:4.1.0@sha256:1d1aa21d34e851df4e8a87b391c27724c06e2597608e7161f4d167be853bd7b6
  ab_internal:
    ql: 100
    sl: 100
  registryOverrides:
    oss:
      enabled: true
    cloud:
      enabled: false
metadataSpecVersion: "1.0"
# NOTE: `baseImage` is pinned to python-connector-base 4.1.0 (Python 3.13). `definitionId` is
# the id from Airbyte's registry for the original (archived) connector. This metadata is only
# consumed by Airbyte's `airbyte-ci` tooling; the standalone Dockerfile is the build path for
# self-hosted deployment and pins the same base image.
